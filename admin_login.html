<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Login</title>
    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background:;
        font-family: "Poppins", Arial, sans-serif;
      }

      .login-box {
        background: #fff;
        padding: 30px;
        width: 350px;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      .login-box h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #1e3c72;
      }

      input {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border-radius: 5px;
        border: 1px solid #ccc;
      }

      button {
        width: 100%;
        padding: 10px;
        background: #1e3c72;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
      }

      button:hover {
        background: #16305c;
      }

      .error {
        color: red;
        text-align: center;
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <form class="login-box" method="POST">
      <h2>Admin Login</h2>

      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}

      <input
        type="text"
        name="username"
        placeholder="Admin Username"
        required
      />
      <input type="password" name="password" placeholder="Password" required />

      <button type="submit">Login</button>
    </form>
  </body>
</html>
