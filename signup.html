<!doctype html>
<html>
  <head>
    <title>Sign Up</title>

    <style>
      body {
        margin: 0;
        font-family: "Poppins", Arial, sans-serif;
        background: #f1f5f9;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      form {
        background: #ffffff;
        padding: 35px;
        border-radius: 14px;
        width: 90%;
        max-width: 420px;
        text-align: center;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      }

      h2 {
        margin-bottom: 20px;
        color: #111827;
      }

      input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 8px;
        border: 1px solid #d1d5db;
        font-size: 15px;
      }

      input:focus {
        border-color: #4f46e5;
        outline: none;
      }

      .file-input {
        text-align: left;
        font-size: 14px;
        margin-top: 10px;
      }

      button {
        width: 100%;
        padding: 13px;
        border: none;
        border-radius: 8px;
        background: #303033;
        color: white;
        font-weight: bold;
        cursor: pointer;
        margin-top: 15px;
        font-size: 16px;
        transition: 0.3s;
      }

      button:hover {
        background: #0c0c0d;
      }

      .links {
        margin-top: 15px;
        font-size: 14px;
      }

      .links a {
        color: #4f46e5;
        text-decoration: none;
      }

      .links a:hover {
        text-decoration: underline;
      }

      .flash {
        color: red;
        margin-bottom: 10px;
        font-size: 14px;
      }
      .flash-box {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        z-index: 2000;
        text-align: center;
        min-width: 280px;
      }

      .flash-item {
        margin-bottom: 10px;
        color: #ef4444;
        font-size: 14px;
      }

      .flash-box button {
        padding: 8px 16px;
        background: #4f46e5;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <form action="/signup" method="POST" enctype="multipart/form-data">
      <h2>Create Account</h2>

      <!-- FLASH MESSAGES -->
      {% with messages = get_flashed_messages(with_categories=true) %} {% if
      messages %}
      <div id="flashBox" class="flash-box">
        {% for category, message in messages %}
        <div class="flash-item">{{ message }}</div>
        {% endfor %}
        <button onclick="closeFlash()">OK</button>
      </div>
      {% endif %} {% endwith %}

      <input type="text" name="name" placeholder="Full Name" required />

      <input type="email" name="email" placeholder="Email" required />

      <!-- STUDENT CARD -->
      <div class="file-input">
        <label>Upload Student Card:</label>
        <input
          type="file"
          name="student_card"
          accept="image/*"
          id="fileInput"
          required
        />

        <p
          id="fileName"
          style="font-size: 13px; color: #6b7280; margin-top: 5px"
        >
          No file selected
        </p>
      </div>

      <button type="submit">Sign Up</button>

      <div class="links">
        <a href="/login">Already have an account?</a>
      </div>
    </form>
    <script>
      function closeFlash() {
        document.getElementById("flashBox").style.display = "none";
      }

      // Show selected file name
      document
        .getElementById("fileInput")
        ?.addEventListener("change", function () {
          let fileName = this.files[0]?.name;
          document.getElementById("fileName").innerText = fileName
            ? "Selected: " + fileName
            : "No file selected";
        });
    </script>
  </body>
</html>
