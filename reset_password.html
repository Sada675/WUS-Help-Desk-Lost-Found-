<!doctype html>
<html>
  <head>
    <title>Reset Password</title>
    <style>
      body {
        margin: 0;
        font-family: "Poppins", Arial, sans-serif;
        background: #f1f5f9;
        background-size: 400% 400%;
        animation: bgMotion 12s ease infinite;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      @keyframes bgMotion {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      .box {
        background: rgba(255, 255, 255, 0.1);
        padding: 40px 30px;
        border-radius: 12px;
        width: 70%;
        max-width: 400px;
        text-align: center;
      }

      h2 {
        margin-bottom: 25px;
        color: #0f0f0f;
      }

      input[type="password"] {
        width: 100%;
        padding: 14px;
        margin: 10px 0;
        border-radius: 8px;
        border: none;
        outline: none;
        font-size: 16px;
      }

      button {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 8px;
        background-color: #2e2d2d;
        color: #fff;
        font-weight: bold;
        cursor: pointer;
        font-size: 16px;
        margin-top: 10px;
      }

      button:hover {
        background-color: #0c0c0c;
      }

      .link {
        margin-top: 15px;
        font-size: 14px;
      }

      .link a {
        color: #0f0e0f;
        text-decoration: none;
      }

      .link a:hover {
        text-decoration: underline;
      }

      .skip-btn {
        display: inline-block;
        margin-top: 15px;
        background: transparent;
        color: #0f0e0f;
        border: 1px solid #0f0e0f;
        padding: 8px 16px;
        border-radius: 6px;
        cursor: pointer;
        text-decoration: none;
      }

      .skip-btn:hover {
        background: #0f0e0f;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h2>Reset Password</h2>
      <form method="POST">
        <input
          type="password"
          name="password"
          placeholder="Enter new password"
          required
        />
        <button type="submit">Reset Password</button>
      </form>
      <div class="link">
        <a href="{{ url_for('skip_reset') }}" class="skip-btn">Skip</a>
      </div>
    </div>
  </body>
</html>
