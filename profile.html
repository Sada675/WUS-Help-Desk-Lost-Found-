<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Profile</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <style>
            * {
              margin: 0;
              padding: 0;
              box-sizing: border-box;
              font-family: "Segoe UI", sans-serif;
            }

            body {
              background: #f9fafb;
            }

            .container {
              max-width: 1000px;
              margin: 100px auto;
              background: #fff;
              padding: 30px;
              border-radius: 16px;
              box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            }

            h2 {
              text-align: center;
              margin-bottom: 20px;
            }

            /* PROFILE TOP */
            .top {
              display: flex;
              align-items: center;
              gap: 20px;
              margin-bottom: 30px;
            }

            .top img {
              width: 90px;
              height: 90px;
              border-radius: 50%;
              border: 3px solid #4f46e5;
              cursor: pointer;
            }

            .top-info h3 {
              margin-bottom: 5px;
            }

            .badge {
              padding: 5px 10px;
              border-radius: 20px;
              font-size: 12px;
              color: white;
            }

            .approved { background: #22c55e; }
            .pending { background: #f59e0b; }
            .rejected { background: #ef4444; }

            /* FORM */
            .form-grid {
              display: grid;
              grid-template-columns: 1fr 1fr;
              gap: 15px;
            }

            .form-group {
              display: flex;
              flex-direction: column;
            }

            .form-group label {
              font-size: 13px;
              margin-bottom: 5px;
            }

            .form-group input, .form-group textarea {
              padding: 10px;
              border-radius: 8px;
              border: 1px solid #ccc;
              outline: none;
            }

            textarea {
              resize: none;
            }

            /* BUTTONS */
            .buttons {
              margin-top: 20px;
              text-align: center;
            }

            .btn {
              padding: 10px 20px;
              border-radius: 8px;
              border: none;
              cursor: pointer;
              color: white;
              font-weight: 600;
              margin: 5px;
            }

            .edit { background: #4f46e5; }
            .save { background: #22c55e; }

            /* PROGRESS */
            .progress-box {
              margin: 20px 0;
            }

            .progress-bar {
              height: 10px;
              background: #e5e7eb;
              border-radius: 10px;
              overflow: hidden;
            }

            .progress-fill {
              height: 100%;
              background: #4f46e5;
              width: {{ completion }}%;
            }
            .profile-wrapper {
        position: relative;
        width: 90px;
        height: 90px;
      }

      .profile-wrapper img {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        border: 3px solid #4f46e5;
        object-fit: cover;
      }

      /* PLUS ICON */
      .plus-icon {
        position: absolute;
        bottom: 5px;
        right: 5px;
        width: 22px;
        height: 22px;
        background: #4f46e5;
        color: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        border: 2px solid white;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>My Profile</h2>

      <!-- PROFILE TOP -->
      <div class="top">
        <form
          action="/upload-profile"
          method="POST"
          enctype="multipart/form-data"
        >
          <label for="profileInput" class="profile-upload">
            <div class="profile-wrapper">
              <img
                id="profilePic"
                src="{% if user and user.profile_image %}
        {{ url_for('static', filename='uploads/' + user.profile_image) }}
        {% else %}
        https://cdn-icons-png.flaticon.com/512/847/847969.png
        {% endif %}"
              />

              <!-- PLUS ICON -->
              <div class="plus-icon">
                <i class="fa fa-plus"></i>
              </div>
            </div>
          </label>

          <input
            type="file"
            id="profileInput"
            name="profile_image"
            accept="image/*"
            hidden
            onchange="this.form.submit()"
          />
        </form>
        <div class="top-info">
          <h3>{{ user.name }}</h3>

          <p>{{ user.email if user.email else 'Email not provided' }}</p>

          <p style="font-size: 12px; color: #6b7280">
            Address: {{ user.address if user.address else 'Optional' }}
          </p>

          <p style="font-size: 12px; color: #6b7280">
            Bio: {{ user.bio if user.bio else 'Optional' }}
          </p>

          <span
            class="badge {% if user.status == 'approved' %}approved {% elif user.status == 'pending' %}pending {% else %}rejected{% endif %}"
          >
            {{ user.status }}
          </span>
        </div>
      </div>
      <!-- PROGRESS -->
      <div class="progress-box">
        <p>Profile Completion: {{ completion }}%</p>
        <div class="progress-bar">
          <div class="progress-fill"></div>
        </div>
      </div>

      <!-- FORM -->
      <form action="/update-profile" method="POST">
        <div class="form-grid">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" value="{{ user.name }}" />
          </div>

          <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" value="{{ user.email }}" />
          </div>

          <div class="form-group">
            <label>Phone</label>
            <input type="text" name="phone" value="{{ user.phone or '' }}" />
          </div>

          <div class="form-group">
            <label>Department</label>
            <input
              type="text"
              name="department"
              value="{{ user.department or '' }}"
            />
          </div>

          <div class="form-group" style="grid-column: span 2">
            <label>Address </label>
            <input
              type="text"
              name="address"
              placeholder="Enter address "
              value="{{ user.address or '' }}"
            />
          </div>

          <div class="form-group" style="grid-column: span 2">
            <label>Bio </label>
            <textarea name="bio" placeholder="Write something about yourself">
{{ user.bio or '' }}</textarea
            >
          </div>
        </div>
        <div class="buttons">
          <button type="submit" class="btn save">Save Changes</button>
        </div>
      </form>
    </div>
  </body>
</html>
