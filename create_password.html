<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Create Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", Arial, sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f1f5f9;
      }

      .container {
        background: white;
        padding: 40px;
        border-radius: 20px;
        width: 350px;
        text-align: center;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
        color: #222;
      }

      h2 {
        margin-bottom: 10px;
      }

      p {
        font-size: 14px;
        margin-bottom: 25px;
        color: #555;
      }

      .input-group {
        position: relative;
        margin-bottom: 20px;
      }

      input {
        width: 100%;
        padding: 12px 40px 12px 12px;
        border: 1px solid #ccc;
        border-radius: 10px;
        outline: none;
      }

      .toggle {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
      }

      button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #764ba2;
        color: white;
        font-weight: 600;
        cursor: pointer;
      }

      button:hover {
        background: #5a3780;
      }

      .strength {
        font-size: 12px;
        margin-top: 5px;
        text-align: left;
      }

      .flash {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #ff4d4d;
        color: white;
        padding: 10px 20px;
        border-radius: 8px;
      }

      .flash.success {
        background: #2ecc71;
      }
    </style>
  </head>

  <body>
    {% with messages = get_flashed_messages(with_categories=true) %} {% if
    messages %} {% for category, message in messages %}
    <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %} {% endif %} {% endwith %}

    <div class="container">
      <h2>Create Password 🔐</h2>
      <p>Set a strong password to secure your account</p>

      <form method="POST">
        <!-- PASSWORD -->
        <div class="input-group">
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter password"
            required
          />
          <span class="toggle" onclick="togglePassword('password')">👁</span>
        </div>

        <!-- CONFIRM PASSWORD -->
        <div class="input-group">
          <input
            type="password"
            id="confirm"
            name="confirm_password"
            placeholder="Confirm password"
            required
          />
          <span class="toggle" onclick="togglePassword('confirm')">👁</span>
        </div>

        <div class="strength" id="strengthText"></div>

        <button type="submit">Create Account 🚀</button>
      </form>
    </div>

    <script>
      const password = document.getElementById("password");
      const strengthText = document.getElementById("strengthText");

      password.addEventListener("input", () => {
        const value = password.value;

        if (value.length < 6) {
          strengthText.textContent = "Weak password ❌";
          strengthText.style.color = "red";
        } else if (value.match(/[A-Z]/) && value.match(/[0-9]/)) {
          strengthText.textContent = "Strong password 💪";
          strengthText.style.color = "green";
        } else {
          strengthText.textContent = "Medium strength ⚠️";
          strengthText.style.color = "orange";
        }
      });

      // 🔥 FIXED FUNCTION (works for both fields)
      function togglePassword(id) {
        const field = document.getElementById(id);
        field.type = field.type === "password" ? "text" : "password";
      }

      // auto hide flash
      setTimeout(() => {
        const flash = document.querySelector(".flash");
        if (flash) flash.style.display = "none";
      }, 3000);
    </script>
  </body>
</html>
