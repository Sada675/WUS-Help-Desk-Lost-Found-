<!doctype html>
<html>
  <head>
    <title>Set Password</title>
    <style>
      body {
        font-family: "Poppins", Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #f1f5f9;
        margin: 0;
      }

      form {
        text-align: center;
        background: #fff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }

      .instructions {
        font-size: 14px;
        margin-bottom: 15px;
        color: #333;
      }

      input {
        width: 40px;
        height: 50px;
        font-size: 24px;
        text-align: center;
        margin: 5px;
        border-radius: 6px;
        border: 1px solid #ccc;
      }

      button {
        display: block;
        margin: 20px auto 0;
        padding: 12px 25px;
        font-size: 16px;
        border-radius: 6px;
        border: none;
        background-color: #2e2d2d;
        color: #fff;
        cursor: pointer;
      }

      button:hover {
        background-color: #0c0c0c;
      }

      /* ✅ FIXED FLASH (TOP CENTER) */
      .flash-container {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
      }

      .flash {
        background: #e74c3c;
        color: white;
        padding: 12px 20px;
        border-radius: 8px;
        margin-bottom: 10px;
        text-align: center;
        min-width: 250px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }

      .flash.success {
        background: #2ecc71;
      }
    </style>
  </head>

  <body>
    <!-- ✅ FLASH MESSAGE (TOP PE SHOW HOGA) -->
    {% with messages = get_flashed_messages(with_categories=true) %} {% if
    messages %}
    <div class="flash-container">
      {% for category, message in messages %}
      <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    </div>
    {% endif %} {% endwith %}

    <!-- FORM -->
    <form method="POST" action="/set-password" id="passwordForm">
      <div class="instructions">
        OTP & suggested password have been sent to your email. Enter OTP and
        continue.
      </div>

      <h2>Enter OTP</h2>

      <div id="otp-inputs">
        <input type="text" maxlength="1" pattern="[0-9]" required />
        <input type="text" maxlength="1" pattern="[0-9]" required />
        <input type="text" maxlength="1" pattern="[0-9]" required />
        <input type="text" maxlength="1" pattern="[0-9]" required />
        <input type="text" maxlength="1" pattern="[0-9]" required />
        <input type="text" maxlength="1" pattern="[0-9]" required />
      </div>

      <input type="hidden" name="otp" id="otp" />
      <input type="hidden" name="password" id="password" value="123456" />

      <button type="submit">Continue</button>
    </form>

    <!-- JS -->
    <script>
      const inputs = document.querySelectorAll("#otp-inputs input");
      const otpField = document.getElementById("otp");

      inputs.forEach((input, index) => {
        input.addEventListener("input", () => {
          if (input.value.length === 1 && index < inputs.length - 1) {
            inputs[index + 1].focus();
          }

          let otpValue = "";
          inputs.forEach((i) => (otpValue += i.value));
          otpField.value = otpValue;
        });

        input.addEventListener("keydown", (e) => {
          if (e.key === "Backspace" && input.value === "" && index > 0) {
            inputs[index - 1].focus();
          }
        });
      });

      /* ✅ AUTO HIDE FLASH */
      setTimeout(() => {
        const flash = document.querySelector(".flash-container");
        if (flash) {
          flash.style.display = "none";
        }
      }, 3000);
    </script>
  </body>
</html>
