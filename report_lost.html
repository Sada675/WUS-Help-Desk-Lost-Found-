<!doctype html>
<html>
  <head>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
    <style>
      .page-header {
        position: relative;
        text-align: center;
        margin-bottom: 20px;
      }

      .page-header h2 {
        margin: 30px 0;
        font-size: 26px;
        font-weight: bold;
      }

      .back-btn {
        position: absolute;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        font-size: 22px;
        cursor: pointer;
        color: #111;
      }

      .back-btn:hover {
        color: #cbcdd1;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="page-header">
        <button onclick="history.back()" class="back-btn">
          <i class="fa-solid fa-arrow-left"></i>
        </button>

        <h2>Report Lost Item</h2>
      </div>

      <form action="/report-lost" method="POST" enctype="multipart/form-data">
        <input name="title" placeholder="Item name" required />
        <select name="category" required>
          <option value="">Select Category</option>
          <option>Electronics</option>
          <option>Documents</option>
          <option>Money</option>
          <option>Jewelry</option>
          <option>Other</option>
        </select>
        <input name="location" placeholder="Lost location" required />
        <input type="date" name="lost_date" required />
        <textarea
          name="description"
          placeholder="Description"
          required
        ></textarea>
        <input type="file" name="image" />
        <button type="submit">Submit</button>
      </form>
    </div>
  </body>
</html>
