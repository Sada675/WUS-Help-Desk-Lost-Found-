<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Admin - Users</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/admin.css') }}"
    />
    <style>
      body {
        font-family: font-family: "Poppins", Arial, sans-serif;
                    margin: 0;
                    background: #f3f4f6;
                  }
                  .container {
                    margin-left: 100px;
                    margin-right: 100px;
                    padding: 20px;
                  }

                  .user-card {
                    background: #fff;
                    border-radius: 10px;
                    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
                    padding: 15px;
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                    margin-bottom: 15px;
                    transition: 0.2s;
                  }
                  .user-card:hover {
                    transform: scale(1.02);
                  }

                  .user-info {
                    display: flex;
                    align-items: center;
                  }
                  .user-info img {
                    width: 50px;
                    height: 50px;
                    border-radius: 50%;
                    margin-right: 15px;
                  }
                  .user-info div {
                    display: flex;
                    flex-direction: column;
                  }
                  .user-info div h4 {
                    margin: 0;
                  }

                  .user-actions button {
                    background: #2563eb;
                    color: #fff;
                    border: none;
                    padding: 6px 12px;
                    margin-left: 5px;
                    border-radius: 5px;
                    cursor: pointer;
                    transition: 0.2s;
                  }
                  .user-actions button.block {
                    background: #ef4444;
                  }
                  .user-actions button.unblock {
                    background: #10b981;
                  }
                  .user-actions button.delete {
                    background: #f59e0b;
                  }
                  .user-actions button:hover {
                    opacity: 0.85;
                  }

                  /* Search Bar */
                  .search-bar {
                    width: 100%;
                    max-width: 1400px;
                    margin-bottom: 20px;
                    display: flex;
                    justify-content: center;
                  }
                  .search-bar form {
                    width: 100%;
                    display: flex;
                    border: 1px solid #ccc;
                    border-radius: 25px;
                    overflow: hidden;
                    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
                    background: #fff;
                  }
                  .search-bar input[type="text"] {
                    flex: 1;
                    padding: 10px 20px;
                    border: none;
                    outline: none;
                    font-size: 16px;
                    color: #333;
                  }
                  .search-bar input[type="text"]::placeholder {
                    color: #aaa;
                    font-style: italic;
                  }
                  .search-bar button {
                    padding: 10px 20px;
                    background-color: #4caf50;
                    border: none;
                    cursor: pointer;
                    color: #fff;
                    font-weight: bold;
                    transition: 0.3s;
                  }
                  .search-bar button:hover {
                    background-color: #45a049;
                  }

                  @media (max-width: 500px) {
                    .search-bar {
                      max-width: 100%;
                    }
                    .search-bar input[type="text"] {
                      font-size: 14px;
                    }
                    .search-bar button {
                      padding: 10px;
                      font-size: 14px;
                    }
                  }

                  /* Delete Confirmation Modal */
                  .modal {
                    display: none;
                    position: fixed;
                    z-index: 1000;
                    left: 0;
                    top: 0;
                    width: 100%;
                    height: 100%;
                    background-color: rgba(0, 0, 0, 0.5);
                  }
                  .modal-content {
                    background-color: #fff;
                    margin: 15% auto;
                    padding: 30px;
                    border-radius: 10px;
                    width: 90%;
                    max-width: 400px;
                    text-align: center;
                    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
                  }
                  .modal-buttons {
                    display: flex;
                    justify-content: space-around;
                    margin-top: 20px;
                    margin-left: 150px;
                  }
                  .modal-buttons button {
                    padding: 8px 20px;
                    border: none;
                    border-radius: 5px;
                    font-weight: bold;
                    cursor: pointer;
                    transition: 0.2s;
                  }
                  .modal-buttons #cancelBtn {
                    background-color: #ccc;
                  }
                  .modal-buttons #confirmBtn {
                    background-color: #ef4444;
                    color: #fff;
                  }
                  .modal-buttons button:hover {
                    opacity: 0.85;
                  }
                  .header {
              display: flex;
              align-items: center;
              gap: 10px;
              margin-bottom: 10px;
            }

            .back-btn {
        background: none;
        border: none;
        cursor: pointer;
        padding: 6px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.2s;
      }

      .back-btn:hover {
        background: #e5e7eb;
      }
      .header{
        font-size:25px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <button
          class="back-btn"
          onclick="window.location.href='{{ url_for('admin_dashboard') }}'"
        >
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path
              d="M15 18L9 12L15 6"
              stroke="#111"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
        <h2>All Users</h2>
      </div>
      <div class="search-bar">
        <form method="GET" action="{{ url_for('admin_users') }}">
          <input
            type="text"
            id="searchInput"
            name="q"
            placeholder="Search by name or email"
          />
          <button type="submit">Search</button>
        </form>
      </div>
      <p
        id="noResults"
        style="display: none; color: red; text-align: center; font-weight: bold"
      >
        No user found
      </p>

      {% for user in users %}
      <div
        class="user-card"
        data-name="{{ user.name | lower }}"
        data-email="{{ user.email | lower }}"
      >
        <div class="user-info">
          <img
            src="{{ url_for('static', filename='uploads/' ~ user.profile_image) if user.profile_image else url_for('static', filename='images/default_user.png') }}"
            alt="{{ user.name }}"
          />
          <div>
            <h4>{{ user.name }}</h4>
            <p>{{ user.email }}</p>
          </div>
        </div>
        <div class="user-actions">
          {% if user.is_verified %}
          <button
            class="block"
            onclick="location.href='/admin/block-user/{{ user.id }}'"
          >
            Block
          </button>
          {% else %}
          <button
            class="unblock"
            onclick="location.href='/admin/unblock-user/{{ user.id }}'"
          >
            Unblock
          </button>
          {% endif %}
          <button class="delete" onclick="confirmDelete('{{ user.id }}')">
            Delete
          </button>
          <button onclick="location.href='/admin/contact-user/{{ user.id }}'">
            Contact
          </button>
        </div>
      </div>
      {% endfor %}
    </div>

    <!-- GLOBAL DELETE MODAL -->
    <div id="deleteModal" class="modal">
      <div class="modal-content">
        <h3>Are you sure you want to delete this user?</h3>
        <div class="modal-buttons">
          <button id="cancelBtn">Cancel</button>
          <button id="confirmBtn">Delete</button>
        </div>
      </div>
    </div>

    <script>
      let deleteUserId = null;

      function confirmDelete(userId) {
        deleteUserId = userId;
        document.getElementById("deleteModal").style.display = "block";
      }

      document.getElementById("cancelBtn").onclick = function () {
        document.getElementById("deleteModal").style.display = "none";
        deleteUserId = null;
      };

      document.getElementById("confirmBtn").onclick = function () {
        if (deleteUserId) {
          window.location.href = "/admin/delete-user/" + deleteUserId;
        }
      };

      // Close modal if clicked outside
      window.onclick = function (event) {
        const modal = document.getElementById("deleteModal");
        if (event.target == modal) {
          modal.style.display = "none";
          deleteUserId = null;
        }
      };
      const searchInput = document.getElementById("searchInput");
      const userCards = document.querySelectorAll(".user-card");
      const noResults = document.getElementById("noResults");

      searchInput.addEventListener("input", function () {
        let value = this.value.toLowerCase();
        let found = 0;

        userCards.forEach((card) => {
          let name = card.getAttribute("data-name");
          let email = card.getAttribute("data-email");

          if (name.includes(value) || email.includes(value)) {
            card.style.display = "flex";
            found++;
          } else {
            card.style.display = "none";
          }
        });

        // No results handling
        if (found === 0) {
          noResults.style.display = "block";
        } else {
          noResults.style.display = "none";
        }
      });
      function goBack() {
        window.history.back();
      }
    </script>
  </body>
</html>
