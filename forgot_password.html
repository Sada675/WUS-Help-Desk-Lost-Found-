<!doctype html>
<html>
  <head>
    <title>Forgot Password</title>
    <style>
      body {
        margin: 0;
        font-family: font-family: "Poppins", Arial, sans-serif;
        background: #f1f5f9;
        background-size: 400% 400%;
        animation: bgMotion 12s ease infinite;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      @keyframes bgMotion {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      form {
        background: rgba(255, 255, 255, 0.1);
        padding: 30px;
        border-radius: 12px;
        width: 70%;
        max-width: 500px;
        text-align: center;
      }

      h2 {
        color: #0f0f0f;
        margin-bottom: 20px;
      }

      input {
        width: 100%;
        padding: 14px;
        margin: 10px 0;
        border-radius: 8px;
        border: none;
        outline: none;
        font-size: 16px;
      }

      button {
        width: 75%;
        padding: 14px;
        border: none;
        border-radius: 8px;
        background-color: #2e2d2d;
        color: #fff;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
        font-size: 16px;
      }

      button:hover {
        background-color: #0c0c0c;
      }

      .links {
        display: flex;
        justify-content: space-between;
        margin-top: 15px;
        margin-left: 90px;
        margin-right: 90px;
        font-size: 14px;
      }

      .links a {
        color: #0f0e0f;
        text-decoration: none;
      }

      .links a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <form action="/forgot-password" method="POST">
      <h2>Forgot Password</h2>
      <input
        type="email"
        name="email"
        placeholder="Enter your Email"
        required
      />
      <button type="submit">Send OTP</button>

      <div class="links">
        <a href="/login">Back to Login</a>
        <a href="/signup">Create Account</a>
      </div>
    </form>
  </body>
</html>
